<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Investimentos — Orçamento Familiar</title>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-main: #080b14;
      --bg-card: rgba(18, 24, 40, 0.85);
      --bg-card-hover: rgba(26, 34, 54, 0.95);
      --border-color: rgba(255, 255, 255, 0.07);
      --text-primary: #f0f4ff;
      --text-secondary: #8896b3;
      --text-muted: #4a5568;
      --color-income: #10b981;
      --color-expense: #f43f5e;
      --color-accent: #3b82f6;
      --color-gold: #f59e0b;
      --color-purple: #8b5cf6;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-main);
      color: var(--text-primary);
      min-height: 100vh;
      padding: 1.5rem;
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(59, 130, 246, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(139, 92, 246, 0.05) 0%, transparent 50%);
    }
    #loading-screen {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; min-height: 60vh; gap: 1rem;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid rgba(99, 179, 237, 0.15);
      border-top-color: var(--color-accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--text-secondary); font-size: 0.9rem; }
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem;
    }
    .page-title { display: flex; align-items: center; gap: 0.75rem; }
    .page-title .icon {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--color-gold), #d97706);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; box-shadow: 0 4px 20px rgba(245, 158, 11, 0.3);
    }
    .page-title h1 { font-size: 1.5rem; font-weight: 700; }
    .page-title p { font-size: 0.8rem; color: var(--text-secondary); }
    .last-updated { font-size: 0.75rem; color: var(--text-muted); }
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1rem; margin-bottom: 2rem;
    }
    .kpi-card {
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: 14px; padding: 1.4rem 1.6rem; backdrop-filter: blur(12px);
      transition: transform 0.2s; position: relative; overflow: hidden;
    }
    .kpi-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0;
      height: 2px; border-radius: 14px 14px 0 0;
    }
    .kpi-card.gold::before   { background: linear-gradient(90deg, var(--color-gold), #d97706); }
    .kpi-card.green::before  { background: linear-gradient(90deg, var(--color-income), #059669); }
    .kpi-card.blue::before   { background: linear-gradient(90deg, var(--color-accent), #2563eb); }
    .kpi-card.purple::before { background: linear-gradient(90deg, var(--color-purple), #7c3aed); }
    .kpi-card:hover { transform: translateY(-2px); }
    .kpi-label { font-size: 0.75rem; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.5rem; }
    .kpi-value { font-size: 1.8rem; font-weight: 700; line-height: 1.1; }
    .kpi-value.gold   { color: var(--color-gold); }
    .kpi-value.green  { color: var(--color-income); }
    .kpi-value.blue   { color: var(--color-accent); }
    .kpi-value.purple { color: var(--color-purple); }
    .kpi-sub { font-size: 0.78rem; color: var(--text-muted); margin-top: 0.4rem; }
    .charts-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 1rem; margin-bottom: 2rem;
    }
    @media (max-width: 900px) { .charts-grid { grid-template-columns: 1fr; } }
    .chart-card {
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: 14px; padding: 1.4rem; backdrop-filter: blur(12px);
    }
    .chart-title {
      font-size: 0.9rem; font-weight: 600; color: var(--text-primary);
      margin-bottom: 1.2rem; display: flex; align-items: center; gap: 0.5rem;
    }
    .chart-title .badge {
      font-size: 0.65rem; background: rgba(99, 179, 237, 0.15); color: var(--color-accent);
      padding: 0.15rem 0.5rem; border-radius: 20px; font-weight: 500;
    }
    .chart-wrap      { position: relative; height: 260px; }
    .chart-wrap-tall { position: relative; height: 320px; }
    .full-chart-card {
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: 14px; padding: 1.4rem; backdrop-filter: blur(12px);
      margin-bottom: 2rem;
    }
    .section-title {
      font-size: 1rem; font-weight: 700; color: var(--text-primary);
      margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem;
    }
    .inv-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem; margin-bottom: 2rem;
    }
    .inv-card {
      background: var(--bg-card); border: 1px solid var(--border-color);
      border-radius: 14px; padding: 1.3rem; backdrop-filter: blur(12px);
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
    }
    .inv-card:hover {
      transform: translateY(-3px); border-color: rgba(99, 179, 237, 0.3);
      box-shadow: 0 8px 30px rgba(0,0,0,0.3);
    }
    .inv-card-header {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 1rem;
    }
    .inv-name { font-size: 0.95rem; font-weight: 600; color: var(--text-primary); }
    .inv-institution { font-size: 0.72rem; color: var(--text-muted); margin-top: 0.2rem; }
    .inv-badge {
      font-size: 0.65rem; padding: 0.2rem 0.6rem; border-radius: 20px;
      font-weight: 500; white-space: nowrap;
    }
    .inv-badge.bb     { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
    .inv-badge.sicoob { background: rgba(16, 185, 129, 0.15); color: #10b981; }
    .inv-badge.gov    { background: rgba(99, 179, 237, 0.15);  color: #63b3ed; }
    .inv-badge.other  { background: rgba(139, 92, 246, 0.15);  color: #8b5cf6; }
    .inv-saldo { font-size: 1.6rem; font-weight: 700; color: var(--color-gold); margin-bottom: 0.8rem; }
    .inv-saldo.negative { color: var(--color-expense); }
    .inv-meta {
      display: flex; justify-content: space-between; font-size: 0.75rem;
      color: var(--text-secondary); padding-top: 0.8rem; border-top: 1px solid var(--border-color);
    }
    .inv-meta span { display: flex; flex-direction: column; gap: 0.2rem; }
    .inv-meta strong { font-size: 0.82rem; color: var(--text-primary); }
    .inv-bar-wrap {
      background: rgba(0,0,0,0.3); border-radius: 4px;
      height: 5px; margin-bottom: 0.5rem; overflow: hidden;
    }
    .inv-bar-fill {
      height: 100%; border-radius: 4px;
      background: linear-gradient(90deg, var(--color-gold), #d97706);
    }
    .rendimentos-list { display: flex; flex-direction: column; gap: 0.6rem; }
    .rendimento-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.7rem 1rem; background: rgba(16, 185, 129, 0.05);
      border: 1px solid rgba(16, 185, 129, 0.1); border-radius: 8px; font-size: 0.85rem;
    }
    .rendimento-row .name { color: var(--text-primary); font-weight: 500; }
    .rendimento-row .val  { color: var(--color-income); font-weight: 600; }
    .empty-state { text-align: center; padding: 2rem; color: var(--text-muted); font-size: 0.85rem; }
    .error-card {
      background: rgba(244, 63, 94, 0.1); border: 1px solid rgba(244, 63, 94, 0.3);
      border-radius: 14px; padding: 2rem; text-align: center;
    }
    .error-card h3 { color: var(--color-expense); margin-bottom: 0.5rem; }
    .error-card p  { color: var(--text-secondary); font-size: 0.85rem; }
    @media (max-width: 600px) {
      body { padding: 1rem; }
      .kpi-grid { grid-template-columns: 1fr 1fr; }
      .kpi-value { font-size: 1.3rem; }
      .inv-grid  { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div id="loading-screen">
  <div class="spinner"></div>
  <p class="loading-text">Carregando carteira de investimentos...</p>
</div>

<div id="main-content" style="display:none">
  <div class="page-header">
    <div class="page-title">
      <div class="icon">&#128200;</div>
      <div>
        <h1>Investimentos</h1>
        <p>Visão consolidada da carteira</p>
      </div>
    </div>
    <span class="last-updated" id="last-updated"></span>
  </div>

  <div class="kpi-grid" id="kpi-grid"></div>

  <div class="charts-grid">
    <div class="chart-card">
      <div class="chart-title">&#129383; Composição da Carteira <span class="badge">% por aplicação</span></div>
      <div class="chart-wrap"><canvas id="chart-pizza"></canvas></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">&#127963; Concentração por Instituição</div>
      <div class="chart-wrap"><canvas id="chart-inst"></canvas></div>
    </div>
  </div>

  <div class="full-chart-card">
    <div class="chart-title">&#128202; Evolução da Carteira Total <span class="badge" id="evolution-period"></span></div>
    <div class="chart-wrap-tall"><canvas id="chart-evolution"></canvas></div>
  </div>

  <div class="section-title">&#128176; Rendimentos por Aplicação</div>
  <div class="chart-card" style="margin-bottom: 2rem;">
    <div id="rendimentos-content"></div>
  </div>

  <div class="section-title">&#128203; Detalhes por Aplicação</div>
  <div class="inv-grid" id="inv-grid"></div>
</div>

<script>
  const CSV_URL_LANCAMENTOS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQLH7461ccd_LohlJm_U_4lEpG4lvALEsnwUDlfpmfJH6PLakeOt7U_0hqel8EsS_0Zt8RQF996iZEs/pub?output=csv&gid=0';
  const CSV_URL_CONTAS      = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQLH7461ccd_LohlJm_U_4lEpG4lvALEsnwUDlfpmfJH6PLakeOt7U_0hqel8EsS_0Zt8RQF996iZEs/pub?output=csv&gid=1019128251';

  const PALETTE = ['#f59e0b','#10b981','#3b82f6','#8b5cf6','#f43f5e','#14b8a6','#fb923c','#a3e635','#e879f9','#38bdf8'];

  function parseBRL(str) {
    if (!str) return 0;
    let s = String(str).trim().replace(/R\$\s*/g, '');
    let neg = false;
    if (s.includes('(') && s.includes(')')) { neg = true; s = s.replace(/[()]/g, ''); }
    else if (s.startsWith('-')) { neg = true; s = s.replace(/^-/, ''); }
    s = s.trim();
    if (s.includes(',')) s = s.replace(/\./g, '').replace(',', '.');
    const v = parseFloat(s) || 0;
    return neg ? -v : v;
  }

  function fmtBRL(v) {
    return v.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
  }

  function getCol(row, keywords) {
    const keys = Object.keys(row);
    for (const kw of keywords) {
      const found = keys.find(k =>
        k.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim() ===
        kw.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim()
      );
      if (found !== undefined && row[found] !== undefined) return row[found];
    }
    return '';
  }

  function parseDate(str) {
    if (!str) return null;
    const p = str.split('/');
    if (p.length !== 3) return null;
    return new Date(+p[2], +p[1] - 1, +p[0]);
  }

  function monthKey(date) {
    return date.getFullYear() + '-' + String(date.getMonth() + 1).padStart(2, '0');
  }

  function monthLabel(key) {
    const parts = key.split('-');
    const names = ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    return names[+parts[1] - 1] + '/' + parts[0].slice(2);
  }

  function instBadgeClass(inst) {
    const i = (inst || '').toLowerCase();
    if (i.includes('brasil') || i.includes(' bb')) return 'bb';
    if (i.includes('sicoob')) return 'sicoob';
    if (i.includes('gov') || i.includes('fgts') || i.includes('previ')) return 'gov';
    return 'other';
  }

  async function init() {
    try {
      const [resContas, resLanc] = await Promise.all([
        fetch(CSV_URL_CONTAS).then(r => { if (!r.ok) throw new Error('Falha ao buscar Contas'); return r.text(); }),
        fetch(CSV_URL_LANCAMENTOS).then(r => { if (!r.ok) throw new Error('Falha ao buscar Lancamentos'); return r.text(); })
      ]);

      const opts = { header: true, skipEmptyLines: true, transformHeader: h => h.trim() };
      const contas = Papa.parse(resContas, opts).data;
      const lancamentos = Papa.parse(resLanc, opts).data;

      // Filter investment accounts from Contas sheet
      const investimentos = contas
        .filter(c => {
          const tipo = (getCol(c, ['tipo de conta', 'tipo']) || '').toLowerCase();
          return tipo.includes('investimento');
        })
        .map(c => ({
          cod:         getCol(c, ['cod', 'codigo', 'id']),
          nome:        getCol(c, ['nome da conta', 'conta', 'nome']),
          instituicao: getCol(c, ['instituicao financeira', 'instituicao', 'banco']),
          tipo:        getCol(c, ['tipo de conta', 'tipo']),
          saldo:       parseBRL(getCol(c, ['saldo atual', 'saldo', 'valor'])),
          conciliado:  getCol(c, ['conciliado ate', 'conciliado']),
          apurado:     parseBRL(getCol(c, ['saldo apurado', 'apurado'])),
          informado:   parseBRL(getCol(c, ['saldo informado', 'informado']))
        }))
        .filter(c => c.nome !== '');

      const invNames = new Set(investimentos.map(i => i.nome.trim().toLowerCase()));

      // Map lancamentos — col J (index 9) is the running account balance
      const lancMapped = lancamentos.map(l => {
        const keys = Object.keys(l);
        const saldoKey = keys[9] || '';
        return {
          data:      getCol(l, ['data']),
          conta:     getCol(l, ['conta']),
          obs:       getCol(l, ['obs']),
          valor:     parseBRL(getCol(l, ['valor'])),
          categoria: getCol(l, ['categoria']),
          saldo_acc: parseBRL(l[saldoKey] || '0')
        };
      }).filter(l => l.data);

      // Rendimentos: entries where categoria starts with 'Rendimentos'
      const rendimentos = {};
      lancMapped.forEach(l => {
        const cat = (l.categoria || '').trim().toLowerCase();
        if (cat === 'rendimentos' || cat.startsWith('rendimento')) {
          const k = (l.conta || '').trim();
          rendimentos[k] = (rendimentos[k] || 0) + l.valor;
        }
      });

      // Evolution: last saldo_acc per month for each investment account
      const evolByContaMes = {};
      lancMapped.forEach(l => {
        const contaNorm = (l.conta || '').trim().toLowerCase();
        if (!invNames.has(contaNorm)) return;
        const d = parseDate(l.data);
        if (!d) return;
        const mk = monthKey(d);
        if (!evolByContaMes[contaNorm]) evolByContaMes[contaNorm] = {};
        const prev = evolByContaMes[contaNorm][mk];
        if (!prev || d >= parseDate(prev.data)) {
          evolByContaMes[contaNorm][mk] = { saldo: l.saldo_acc, data: l.data };
        }
      });

      const allMonths = new Set();
      Object.values(evolByContaMes).forEach(byMes => Object.keys(byMes).forEach(mk => allMonths.add(mk)));
      const sortedMonths = Array.from(allMonths).sort();

      const totalPerMonth = sortedMonths.map(mk => {
        let total = 0;
        investimentos.forEach(inv => {
          const contaNorm = inv.nome.trim().toLowerCase();
          const byMes = evolByContaMes[contaNorm] || {};
          const available = Object.keys(byMes).filter(m => m <= mk).sort();
          if (available.length > 0) total += byMes[available[available.length - 1]].saldo;
        });
        return total;
      });

      renderKPIs(investimentos, rendimentos);
      renderPizzaChart(investimentos);
      renderInstChart(investimentos);
      renderEvolutionChart(sortedMonths, totalPerMonth);
      renderRendimentos(rendimentos);
      renderCards(investimentos, rendimentos);

      document.getElementById('last-updated').textContent = 'Atualizado em ' + new Date().toLocaleString('pt-BR');
      document.getElementById('loading-screen').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';

    } catch (e) {
      document.getElementById('loading-screen').innerHTML = `
        <div class="error-card">
          <h3>Erro ao Carregar</h3>
          <p>${e.message}</p>
          <p style="margin-top:0.5rem; font-size:0.75rem;">Verifique os links de publicação do Google Sheets.</p>
        </div>`;
    }
  }

  function renderKPIs(investimentos, rendimentos) {
    const total = investimentos.reduce((s, i) => s + Math.max(i.saldo, 0), 0);
    const maior = investimentos.reduce((a, b) => (b.saldo > a.saldo ? b : a), investimentos[0] || {});
    const totalRendimentos = Object.values(rendimentos).reduce((s, v) => s + v, 0);
    const instituicoes = new Set(investimentos.map(i => (i.instituicao || '').trim().toLowerCase())).size;

    document.getElementById('kpi-grid').innerHTML = `
      <div class="kpi-card gold">
        <div class="kpi-label">&#128188; Total da Carteira</div>
        <div class="kpi-value gold">${fmtBRL(total)}</div>
        <div class="kpi-sub">${investimentos.length} aplicações ativas</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-label">&#128176; Rendimentos Registrados</div>
        <div class="kpi-value green">${fmtBRL(totalRendimentos)}</div>
        <div class="kpi-sub">Lançamentos categoria "Rendimentos"</div>
      </div>
      <div class="kpi-card blue">
        <div class="kpi-label">&#127942; Maior Aplicação</div>
        <div class="kpi-value blue" style="font-size:1.1rem;">${maior.nome || '—'}</div>
        <div class="kpi-sub">${fmtBRL(maior.saldo || 0)}</div>
      </div>
      <div class="kpi-card purple">
        <div class="kpi-label">&#127963; Instituições</div>
        <div class="kpi-value purple">${instituicoes}</div>
        <div class="kpi-sub">Diversificação da carteira</div>
      </div>
    `;
  }

  function renderPizzaChart(investimentos) {
    const positives = investimentos.filter(i => i.saldo > 0);
    const total = positives.reduce((s, i) => s + i.saldo, 0);
    if (positives.length === 0) { document.getElementById('chart-pizza').parentElement.innerHTML = '<div class="empty-state">Sem dados positivos.</div>'; return; }
    new Chart(document.getElementById('chart-pizza'), {
      type: 'doughnut',
      data: {
        labels: positives.map(i => i.nome),
        datasets: [{ data: positives.map(i => i.saldo), backgroundColor: PALETTE.slice(0, positives.length), borderWidth: 2, borderColor: '#080b14', hoverOffset: 8 }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '62%',
        plugins: {
          legend: { position: 'right', labels: { color: '#8896b3', font: { size: 11 }, boxWidth: 12, padding: 10 } },
          tooltip: { callbacks: { label: ctx => ' ' + fmtBRL(ctx.raw) + ' (' + ((ctx.raw / total) * 100).toFixed(1) + '%)' } }
        }
      }
    });
  }

  function renderInstChart(investimentos) {
    const byInst = {};
    investimentos.forEach(i => {
      const inst = (i.instituicao || '').trim() || 'Outros';
      byInst[inst] = (byInst[inst] || 0) + Math.max(i.saldo, 0);
    });
    const labels = Object.keys(byInst);
    const data = Object.values(byInst);
    new Chart(document.getElementById('chart-inst'), {
      type: 'bar',
      data: { labels, datasets: [{ label: 'Saldo', data, backgroundColor: PALETTE.slice(0, labels.length), borderRadius: 6, borderSkipped: false }] },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ' ' + fmtBRL(ctx.raw) } } },
        scales: {
          x: { ticks: { color: '#8896b3', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.04)' } },
          y: { ticks: { color: '#8896b3', callback: v => 'R$' + (v / 1000).toFixed(0) + 'k' }, grid: { color: 'rgba(255,255,255,0.04)' } }
        }
      }
    });
  }

  function renderEvolutionChart(sortedMonths, totalPerMonth) {
    if (sortedMonths.length === 0) {
      document.getElementById('chart-evolution').parentElement.innerHTML = '<div class="empty-state">Nenhum lancamento encontrado nas contas de investimento ainda. Conforme os lancamentos forem importados, o grafico de evolucao sera preenchido automaticamente.</div>';
      return;
    }
    document.getElementById('evolution-period').textContent = monthLabel(sortedMonths[0]) + ' a ' + monthLabel(sortedMonths[sortedMonths.length - 1]);
    new Chart(document.getElementById('chart-evolution'), {
      type: 'line',
      data: {
        labels: sortedMonths.map(monthLabel),
        datasets: [{
          label: 'Total da Carteira', data: totalPerMonth,
          borderColor: '#f59e0b', backgroundColor: 'rgba(245, 158, 11, 0.08)',
          borderWidth: 2.5, pointRadius: 4, pointHoverRadius: 7, pointBackgroundColor: '#f59e0b',
          fill: true, tension: 0.4
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ' ' + fmtBRL(ctx.raw) } } },
        scales: {
          x: { ticks: { color: '#8896b3', font: { size: 11 } }, grid: { color: 'rgba(255,255,255,0.04)' } },
          y: { ticks: { color: '#8896b3', callback: v => 'R$' + (v / 1000).toFixed(0) + 'k' }, grid: { color: 'rgba(255,255,255,0.04)' } }
        }
      }
    });
  }

  function renderRendimentos(rendimentos) {
    const entries = Object.entries(rendimentos).filter(([, v]) => v > 0).sort((a, b) => b[1] - a[1]);
    const el = document.getElementById('rendimentos-content');
    if (entries.length === 0) {
      el.innerHTML = '<div class="empty-state">Nenhum rendimento com categoria "Rendimentos" encontrado ainda. Conforme os lancamentos forem categorizados, eles aparecerão aqui.</div>';
      return;
    }
    const total = entries.reduce((s, [, v]) => s + v, 0);
    el.innerHTML = `
      <div style="display:flex; justify-content:space-between; margin-bottom:1rem; font-size:0.8rem; color:var(--text-secondary);">
        <span>Conta</span><span>Total Registrado</span>
      </div>
      <div class="rendimentos-list">
        ${entries.map(([conta, val]) => `
          <div class="rendimento-row">
            <span class="name">${conta || '—'}</span>
            <span class="val">${fmtBRL(val)}</span>
          </div>`).join('')}
        <div class="rendimento-row" style="background:rgba(245,158,11,0.08); border-color:rgba(245,158,11,0.2); margin-top:0.3rem;">
          <span class="name" style="font-weight:700;">Total</span>
          <span class="val" style="color:var(--color-gold); font-weight:700;">${fmtBRL(total)}</span>
        </div>
      </div>`;
  }

  function renderCards(investimentos, rendimentos) {
    const totalCarteira = investimentos.filter(i => i.saldo > 0).reduce((s, i) => s + i.saldo, 0);
    const sorted = [...investimentos].sort((a, b) => b.saldo - a.saldo);
    document.getElementById('inv-grid').innerHTML = sorted.map(inv => {
      const pct = totalCarteira > 0 ? (Math.max(inv.saldo, 0) / totalCarteira * 100) : 0;
      const rendAcc = rendimentos[inv.nome] || 0;
      const badge = instBadgeClass(inv.instituicao);
      return `
        <div class="inv-card">
          <div class="inv-card-header">
            <div>
              <div class="inv-name">${inv.nome}</div>
              <div class="inv-institution">${inv.instituicao}</div>
            </div>
            <span class="inv-badge ${badge}">${inv.instituicao || 'Outros'}</span>
          </div>
          <div class="inv-saldo ${inv.saldo < 0 ? 'negative' : ''}">${fmtBRL(inv.saldo)}</div>
          <div class="inv-bar-wrap">
            <div class="inv-bar-fill" style="width:${Math.min(pct, 100).toFixed(1)}%"></div>
          </div>
          <div class="inv-meta">
            <span>% da carteira<strong>${pct.toFixed(1)}%</strong></span>
            <span style="text-align:center;">Rendimentos<strong style="color:${rendAcc > 0 ? 'var(--color-income)' : 'var(--text-muted)'}">${rendAcc > 0 ? fmtBRL(rendAcc) : '—'}</strong></span>
            <span style="text-align:right;">Conciliado<strong>${inv.conciliado || '—'}</strong></span>
          </div>
        </div>`;
    }).join('');
  }

  init();
</script>
</body>
</html>
