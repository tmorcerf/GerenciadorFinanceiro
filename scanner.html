<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scanner de Preços</title>
  <link rel="stylesheet" href="style.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <!-- HTML5 QR Code Library -->
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

  <style>
    body {
      background-color: var(--bg-base);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    
    .scanner-container {
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    #reader {
      width: 100%;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      background: var(--bg-card);
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    
    #reader video {
      border-radius: 12px;
    }

    .header-bar {
      width: 100%;
      max-width: 500px;
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }

    .back-btn {
      background: rgba(255,255,255,0.1);
      border: none;
      color: var(--text-primary);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }

    .back-btn:hover {
      background: rgba(255,255,255,0.2);
    }

    .action-btn {
      background: linear-gradient(135deg, var(--color-accent), #4f46e5);
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      width: 100%;
      font-size: 1rem;
      transition: opacity 0.2s;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
    }

    .action-btn:hover {
      opacity: 0.9;
    }

    .status-card {
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 15px;
      text-align: center;
      display: none;
    }

    .status-card.loading {
      display: block;
      color: var(--text-secondary);
    }
    
    .status-card.success {
      display: block;
      border-left: 4px solid var(--color-income);
    }
    
    .status-card.error {
      display: block;
      border-left: 4px solid var(--color-expense);
    }
    
    .items-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 15px;
      text-align: left;
    }
    
    .item-row {
      display: flex;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      padding-bottom: 8px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <div class="header-bar">
    <a href="index.html" class="back-btn">
      <i class="fas fa-arrow-left"></i>
    </a>
    <h2 style="margin: 0; margin-left: 15px; font-size: 1.3rem;">Verifica Ofertas</h2>
  </div>

  <div class="scanner-container">
    
    <div style="background: var(--bg-card); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
      <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 10px; cursor: pointer;" onclick="document.getElementById('config-panel').style.display = document.getElementById('config-panel').style.display === 'none' ? 'block' : 'none'">
        <span style="font-weight: 600; color: var(--text-secondary);"><i class="fas fa-cog"></i> Configuração do Scanner</span>
        <i class="fas fa-chevron-down" style="color: var(--text-muted);"></i>
      </div>
      <div id="config-panel" style="display: none; margin-top: 10px;">
        <p style="font-size: 0.85rem; color: var(--text-muted); margin-bottom: 8px;">Cole aqui a URL do Web App do novo Google Apps Script (Scanner):</p>
        <input type="text" id="scanner-api-url" placeholder="https://script.google.com/macros/s/.../exec" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.2); color: white; outline: none; margin-bottom: 10px; font-size: 0.85rem;">
        <button id="save-config-btn" class="action-btn" style="padding: 8px 15px; font-size: 0.9rem;">Salvar URL</button>
      </div>
    </div>

    <div style="background: var(--bg-card); padding: 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);">
      <p style="margin: 0 0 15px 0; color: var(--text-secondary); font-size: 0.95rem;">Escaneie o QR Code do Cupom Fiscal (NFC-e / SAT) para registrar os preços de mercado ou combustível.</p>
      
      <div id="reader"></div>
      
      <button id="start-btn" class="action-btn" style="margin-top: 15px;">
        <i class="fas fa-camera"></i> Abrir Câmera
      </button>

      <button id="upload-btn" class="action-btn" style="margin-top: 10px; background: rgba(255,255,255,0.05); color: var(--text-primary); border: 1px solid var(--border-color);">
        <i class="fas fa-image"></i> Enviar Foto da Galeria
      </button>
      <input type="file" id="qr-upload-input" accept="image/*" style="display: none;">
      
      <button id="stop-btn" class="action-btn" style="margin-top: 15px; display: none; background: rgba(255,255,255,0.1); color: var(--text-primary);">
        <i class="fas fa-times"></i> Fechar Câmera
      </button>
    </div>

    <!-- Area de status e resultados -->
    <div id="status-container" class="status-card">
      <div id="status-spinner" style="display:none; margin-bottom:10px;">
        <i class="fas fa-circle-notch fa-spin" style="font-size: 2rem; color: var(--color-accent);"></i>
        <p style="margin-top: 10px; color: var(--text-primary);">A IA está lendo o cupom na SEFAZ...</p>
      </div>
      <div id="status-message"></div>
      <div id="results-area" class="items-list" style="display:none;">
        <!-- Items renderizados via JS -->
      </div>
    </div>

  </div>

  <script src="scanner.js"></script>
</body>
</html>
